<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="googlebot" content="noindex, nofollow, noarchive">
  <title>Residue | Welcome Inside</title>
  <link rel="icon" type="image/png" href="/images/residue-web-icon-rounded.png">
  <link rel="shortcut icon" type="image/png" href="/images/residue-web-icon-rounded.png">
  <link rel="preload" as="image" href="images/inside-hero-background.jpeg">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/env.js"></script>
  <script>
    document.documentElement.classList.add('inside-hero-loading');
  </script>
  <style>
    .inside-page.page-fade-in,
    .inside-page.page-fade-out {
      animation: none;
    }

    .inside-page .nav {
      max-width: none;
      margin: 0;
      justify-content: flex-start;
    }

    .inside-page .full-bleed {
      margin-bottom: 20px;
    }

    .inside-page main > section + section {
      border-top: 0;
    }

    .inside-page .inside-hero {
      --inside-hero-image-scale: 1;
      --inside-hero-image-shift: 0px;
      --inside-hero-content-scale: 1;
      --inside-hero-content-shift: 0px;
      min-height: calc(100svh - 73px);
      height: calc(100svh - 73px);
      padding: 0;
      -webkit-mask-image: none;
      mask-image: none;
      filter: none;
      border-bottom: 0;
      box-shadow: 
        0 0 0 3px #000 inset,
        0 0 36px rgba(0, 0, 0, 1),
        0 18px 36px rgba(0, 0, 0, 0.3);
    }

    .inside-page .inside-hero::before {
      inset: 0;
      background-image:
        linear-gradient(180deg, rgba(0, 0, 0, 0.15) 0%, rgba(0, 0, 0, 0) 20%, rgba(0, 0, 0, 0) 80%, rgba(0, 0, 0, 0.15) 100%),
        url("images/inside-hero-background.jpeg");
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
      filter: none;
      box-shadow: 
        0 0 0 3px #000 inset,
        0 0 36px rgba(0, 0, 0, 1),
        0 18px 36px rgba(0, 0, 0, 0.3);
    }

    .inside-page .premium-hero::after {
      display: none;
    }

    .inside-page .inside-hero .hero-overlay {
      display: none;
    }

    .inside-page .inside-hero::before,
    .inside-page .inside-hero .inside-hero-content {
      transform: none;
      transition: none;
      will-change: auto;
    }

    .inside-presence-section {
      padding: 124px 0 24px;
    }


    .inside-presence-shell {
      width: min(100%, 840px);
      margin: 0 auto;
      text-align: center;
    }

    .inside-presence-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: clamp(18px, 3vw, 34px);
      color: #d6b070;
      font-size: clamp(0.95rem, 1.5vw, 1.3rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .inside-presence-eyebrow::before,
    .inside-presence-eyebrow::after {
      content: "";
      width: clamp(76px, 14vw, 116px);
      height: 1px;
      background: rgba(214, 176, 112, 0.42);
    }

    .inside-presence-title {
      margin: 28px 0 0;
      font-size: clamp(3.6rem, 8vw, 5.9rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
      font-weight: 500;
      color: #faf8f5;
    }

    .inside-presence-title-accent {
      color: #d6b070;
    }

    .inside-presence-copy {
      width: min(100%, 620px);
      margin: 28px auto 0;
      color: rgba(198, 199, 207, 0.78);
      font-size: clamp(1.35rem, 2.5vw, 2rem);
      line-height: 1.45;
      font-weight: 400;
    }

    .inside-presence-cta {
      display: flex;
      align-items: stretch;
      width: min(100%, 376px);
      margin: 48px auto 0;
      border-radius: 24px;
      overflow: hidden;
      text-decoration: none;
      color: #171411;
      background: linear-gradient(135deg, #efcb8c 0%, #d3a763 100%);
      box-shadow:
        0 0 0 1px rgba(255, 240, 214, 0.2) inset,
        0 0 36px rgba(214, 176, 112, 0.26),
        0 18px 36px rgba(0, 0, 0, 0.3);
      transition: transform 200ms ease, box-shadow 200ms ease;
      will-change: transform;
    }

    .inside-presence-cta:hover,
    .inside-presence-cta:focus-visible,
    .inside-presence-cta:active {
      transform: translateY(-2px);
      box-shadow:
        0 0 0 1px rgba(255, 240, 214, 0.24) inset,
        0 0 42px rgba(214, 176, 112, 0.32),
        0 22px 42px rgba(0, 0, 0, 0.34);
    }

    .inside-presence-cta-icon {
      width: 118px;
      display: grid;
      place-items: center;
      font-size: clamp(2.35rem, 4vw, 3.4rem);
      line-height: 1;
      border-right: 1px solid rgba(23, 20, 17, 0.16);
      flex-shrink: 0;
    }

    .inside-presence-cta-label {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 30px 24px;
      font-size: clamp(1.2rem, 2vw, 1.9rem);
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-align: center;
      transition: transform 200ms ease;
    }

    .inside-presence-cta:hover .inside-presence-cta-label,
    .inside-presence-cta:hover .inside-presence-cta-icon {
      transform: scale(1.1);
    }
    .inside-presence-cta:focus-visible .inside-presence-cta-label,
    .inside-presence-cta:active .inside-presence-cta-label {
      transform: scale(1.05);
    }

    .inside-hero .inside-hero-title {
      position: absolute;
      top: calc(50% - clamp(190px, 21vw, 260px) - 65px);
      left: 50%;
      z-index: 2;
      width: min(calc(100% - 48px), 900px);
      margin: 0;
      transform: translateX(-50%);
      color: rgba(250, 248, 245, 0.92);
      font-family: 'Space Grotesk', 'Sora', 'Inter', system-ui, -apple-system, sans-serif;
      font-size: clamp(1.18rem, 2.45vw, 2.22rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      line-height: 1.15;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 2px 24px rgba(0, 0, 0, 0.62);
      pointer-events: none;
    }

    .inside-hero-card-animation {
    --inside-hero-card-width: clamp(328px, 48vw, 440px);
    --inside-hero-card-height: calc(var(--inside-hero-card-width) * 0.6294);
    --inside-hero-card-stage-height: calc(var(--inside-hero-card-width) * 0.96);
    --inside-hero-card-radius: clamp(8px, 1.6vw, 14px);

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: var(--inside-hero-card-width);
    height: var(--inside-hero-card-stage-height);
    display: grid;
    place-items: center;
    perspective: 1200px;
    perspective-origin: 50% 45%;
    z-index: 1;
  }

  html.inside-hero-loading:not(.inside-hero-background-ready) .inside-hero-card-animation {
    opacity: 0;
    visibility: hidden;
  }

  html.inside-hero-background-ready .inside-hero-card-animation {
    opacity: 1;
    visibility: visible;
    transition: opacity 420ms ease;
  }

  /* Golden spotlight from above */
  .inside-hero-card-animation::before {
    content: "";
    position: absolute;
    top: -48%;
    left: 50%;
    width: 145%;
    height: 115%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 0;

    background:
      radial-gradient(
        ellipse at 50% 0%,
        rgba(255, 199, 95, 0.45) 0%,
        rgba(255, 176, 64, 0.22) 24%,
        rgba(255, 176, 64, 0.08) 48%,
        rgba(255, 176, 64, 0) 72%
      );


    filter: blur(10px);
    opacity: 0.85;
  }

  /* Shadow underneath the card */
  /* Shadow underneath the card */
  .inside-hero-card-animation::after {
    content: "";
    position: absolute;
    left: 50%;

    /* Places shadow directly under the floating card */
    top: calc(50% + (var(--inside-hero-card-height) * 0.85));

    width: 68%;
    height: 13%;
    transform: translateX(-50%) rotateZ(7deg);
    pointer-events: none;
    z-index: 1;

    background:
      radial-gradient(
        ellipse at center,
        rgba(0, 0, 0) 0%,
        rgba(0, 0, 0) 36%,
        rgba(0, 0, 0) 62%,
        rgba(0, 0, 0) 100%
      );

    filter: blur(14px);
    opacity: 0.72;
    animation: insideHeroCardShadow 7.5s ease-in-out infinite;
  }

  .inside-hero-card-spin {
    position: relative;
    width: var(--inside-hero-card-width);
    height: var(--inside-hero-card-height);
    transform-style: preserve-3d;
    z-index: 2;

    animation: insideHeroCardFloatRotate 7.5s ease-in-out infinite;
  }

  .inside-hero-card-tilt {
    position: absolute;
    inset: 0;
    transform: 
      rotateZ(7deg);  
    transform-style: preserve-3d;
  }

  .inside-hero-card-3d {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transform: 
      rotateY(-13deg);
  }

  .inside-hero-card-face {
    position: absolute;
    inset: 0;
    overflow: hidden;
    border-radius: var(--inside-hero-card-radius);
    background: #000;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transform-style: preserve-3d;
    box-shadow: 
      0 0 0 1px rgba(255, 255, 255, 0.12) inset,
      0 0 12px rgba(87, 66, 31, 0.05),
      0 0 0 0.5px rgba(0, 0, 0, 0.3),
      /* subtle outer golden edge glow */
      1px -2px 8px rgba(255, 184, 76, 0.025),
      4px -3px 22px rgba(82, 59, 24, 0.012);

      animation: insideHeroCardEdgeGlow 7.5s ease-in-out infinite;
  }

  /* Golden light hitting the top-center of the card */
  .inside-hero-card-face::before {
    content: "";
    position: absolute;
    inset: -4%;
    pointer-events: none;
    z-index: 2;

    background:
      radial-gradient(
        ellipse at 40% 6%,
        rgba(255, 196, 93, 0.32) 0%,
        rgba(255, 183, 73, 0.19) 18%,
        rgba(255, 168, 48, 0.10) 34%,
        rgba(255, 168, 48, 0) 58%
      );

    mix-blend-mode: screen;
    opacity: 0.85;

    animation: insideHeroCardGoldenLightMove 7.5s ease-in-out infinite;
  }
  
  .inside-hero-card-face::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;


    

    box-shadow: inset 0 0 0 3px rgba(26, 23, 19, 0.158);

    mix-blend-mode: screen;
    opacity: 0.55;
  }

  .inside-hero-card-face img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    user-select: none;
  }

  .inside-hero-card-front {
    transform: translateZ(1px);
  }

/* Main card motion: only up/down and slight rotation */
@keyframes insideHeroCardFloatRotate {
  0% {
    transform: translateY(0) rotateZ(-1.8deg) rotateX(2deg) rotateY(-3deg);
  }

  50% {
    transform: translateY(-16px) rotateZ(1.8deg) rotateX(4deg) rotateY(3deg);
  }

  100% {
    transform: translateY(0) rotateZ(-1.8deg) rotateX(2deg) rotateY(-3deg);
  }
}

/* Shadow reacts to card movement */
@keyframes insideHeroCardShadow {
  0% {
    transform: translateX(-50%) rotateZ(7deg) scale(1.6);
    opacity: 0.82;
  }

  50% {
    transform: translateX(-50%) rotateZ(7deg) scale(1.05);
    opacity: 0.48;
  }

  100% {
    transform: translateX(-50%) rotateZ(7deg) scale(1.6);
    opacity: 0.82;
  }
}

@keyframes insideHeroCardEdgeGlow {
  0% {
    box-shadow: 
      0 0 0 1px rgba(255, 255, 255, 0.10) inset,
      0 0 12px rgba(87, 66, 31, 0.035),
      0 0 0 0.5px rgba(0, 0, 0, 0.35),
      1px -1px 5px rgba(255, 184, 76, 0.012),
      2px -1px 14px rgba(82, 59, 24, 0.006);
  }

  50% {
    box-shadow: 
      0 0 0 1px rgba(255, 255, 255, 0.10) inset,
      0 0 12px rgba(87, 66, 31, 0.035),
      0 0 0 0.5px rgba(0, 0, 0, 0.35),
      0.5px -0.5px 4px rgba(255, 184, 76, 0.008),
      1px -0.5px 10px rgba(82, 59, 24, 0.004);
  }

  100% {
    box-shadow: 
      0 0 0 1px rgba(255, 255, 255, 0.10) inset,
      0 0 12px rgba(87, 66, 31, 0.035),
      0 0 0 0.5px rgba(0, 0, 0, 0.35),
      1px -1px 5px rgba(255, 184, 76, 0.012),
      2px -1px 14px rgba(82, 59, 24, 0.006);
  }
}

@keyframes insideHeroCardGoldenLightMove {
  0% {
    transform: translate3d(3%, 1%, 0);
    opacity: 0.45;
  }

  50% {
    transform: translate3d(-1.4%, -0.6%, 0);
    opacity: 0.92;
  }

  100% {
    transform: translate3d(3%, 1%, 0);
    opacity: 0.45;
  }
}

    @media (prefers-reduced-motion: reduce) {
      .inside-hero-card-spin {
        animation-duration: 1ms;
        animation-iteration-count: 1;
      }
    }
      .inside-page.inside-page-fade-out .inside-hero .inside-hero-card-spin {
        height: calc(100svh - 61px);
      }

      .inside-presence-section {
        padding: 124px 0 24px;
      }

      .inside-presence-title {
        font-size: 3.1rem;
      }

      .inside-presence-copy {
        font-size: 1.16rem;
      }

      .inside-presence-cta {
        margin-top: 40px;
        border-radius: 20px;
      }

      .inside-presence-cta-icon {
        width: 88px;
        font-size: 2.2rem;
      }

      .inside-presence-cta-label {
        padding: 24px 14px;
        font-size: 1rem;
      }
    
  </style>
</head>
<body data-theme="dark" class="page-fade-in inside-page">
  <header>
    <nav class="nav" aria-label="Main navigation">
      <a class="brand" href="index.html">Residue</a>
    </nav>
  </header>

  <main>
    <section class="hero premium-hero inside-hero full-bleed fade-edges" id="top">
      <div class="hero-overlay" aria-hidden="true"></div>
      <h1 class="inside-hero-title">Welcome to Residue</h1>
      <div class="inside-hero-card-animation" aria-hidden="true">
        <div class="inside-hero-card-spin">
          <div class="inside-hero-card-tilt">
            <div class="inside-hero-card-3d">
              <div class="inside-hero-card-face inside-hero-card-front">
                <img src="images/card-images/card-front-1.jpg" alt="" loading="lazy" decoding="async">
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="inside-presence-section" aria-label="Residue presence">
      <div class="inside-presence-shell">
        <div class="inside-presence-eyebrow">Presence</div>
        <h2 class="inside-presence-title">Carry Your <span class="inside-presence-title-accent">Identity.</span></h2>
        <p class="inside-presence-copy">Precision-crafted stainless steel NFC cards designed to be remembered.</p>
        <a class="inside-presence-cta" href="residue-private.html#purchase">
          <span class="inside-presence-cta-icon" aria-hidden="true">&rarr;</span>
          <span class="inside-presence-cta-label">Purchase Your Card</span>
        </a>
      </div>
    </section>
  </main>

  <script type="module" src="js/supabase-telemetry.js"></script>
  <script src="js/script.js"></script>
  <script>
    (() => {
      const root = document.documentElement;
      const revealHeroCard = () => {
        root.classList.add('inside-hero-background-ready');
        root.classList.remove('inside-hero-loading');
      };

      const background = new Image();
      background.src = 'images/inside-hero-background.jpeg';

      if (background.complete) {
        revealHeroCard();
        return;
      }

      if (background.decode) {
        background.decode().then(revealHeroCard).catch(() => {
          background.addEventListener('load', revealHeroCard, { once: true });
          background.addEventListener('error', revealHeroCard, { once: true });
        });
        return;
      }

      background.addEventListener('load', revealHeroCard, { once: true });
      background.addEventListener('error', revealHeroCard, { once: true });
    })();
  </script>
</body>
</html>
