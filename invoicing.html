<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Residue — NFC Cards</title>
  <link rel="icon" type="image/png" href="/images/residue-web-icon-rounded.png">
  <link rel="shortcut icon" type="image/png" href="/images/residue-web-icon-rounded.png">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/env.js"></script>
</head>
<body class="page-fade-in">
  <header>
    <nav class="nav admin-nav" aria-label="Admin navigation">
      <a class="brand" href="index.html">Residue</a>
      <div class="nav-links admin-nav-links">
        <a class="admin-nav-link" href="card-urls.html">Card URLs</a>
        <a class="admin-nav-link is-active" href="invoicing.html" aria-current="page">Invoicing</a>
        <a class="admin-nav-link admin-nav-exit" href="index.html">Exit</a>
      </div>
    </nav>
  </header>

  <main class="card-urls-page">
    <section class="container" style="padding-top: 120px;">
      <section class="panel reveal card-urls-panel">
        <div class="stack" style="gap:14px;">
          <div class="eyebrow">Manager Access</div>
          <h1 class="h2" style="margin:0;">Invoicing</h1>
          <p class="muted" style="margin:0;">Payment and shipping details for completed purchase attempts.</p>
        </div>

        <div class="card-urls-toolbar">
          <button class="btn" id="invoice-refresh" type="button">Refresh</button>
          <div class="status" id="card-urls-status" aria-live="polite"></div>
        </div>

        <div class="card-urls-table-wrap">
          <table class="card-urls-table">
            <thead>
              <tr>
                <th scope="col">Invoice</th>
                <th scope="col">Name</th>
                <th scope="col">Email</th>
                <th scope="col">Number</th>
                <th scope="col">Quantity</th>
                <th scope="col">Config</th>
                <th scope="col">Logo</th>
                <th scope="col">File</th>
                <th scope="col">Shipping</th>
                <th scope="col">Payment</th>
              </tr>
            </thead>
            <tbody id="invoice-rows-body">
              <tr>
                <td colspan="10" class="card-urls-empty">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="js/card-urls.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
