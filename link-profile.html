<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Residue Link | Profile</title>
  <link rel="icon" type="image/png" href="/images/residue-web-icon-rounded.png">
  <link rel="shortcut icon" type="image/png" href="/images/residue-web-icon-rounded.png">
  <link rel="stylesheet" href="css/tapstyle.css">
  <script src="js/env.js"></script>
  <script type="module" src="js/link-app.js"></script>
  <script defer src="js/link-profile.js"></script>
  <!--<script type]="module" src="js/"></script>-->       <!--enter script to input info from website js-->
</head>

<body class="lt-page" data-theme="dark">
  <div class="lt-overlay" id="lt-overlay">
    <div class="lt-overlay-box">Loadingâ€¦</div>
  </div>

  <!--CARD LAYOUT-->
  <div class="lt-card lt-hero-card">
    <!-- CARD HEADERS -->
    <div class="lt-header">
      <div class="lt-brand" aria-label="Residue logo"><span class="lt-bar"></span> RESIDUE</div>
    </div>

    <!-- CARD PROFILE -->
    <div class="lt-profile">
      <img class="lt-avatar" id="lt-avatar" alt="Profile avatar">
      <h1 class="lt-name" id="lt-name">Loadingâ€¦</h1>
      <p class="lt-title" id="lt-title"></p>
      <p class="lt-bio" id="lt-bio"></p>
    </div>

    <div class="lt-links" id="lt-links"></div>
    <button class="lt-save-contact-btn" id="lt-save-contact-btn" type="button" disabled>Save Contact</button>

    <!--CARD FOOTER-->
    <div class="lt-footer">
      <a class="lt-made" href="https://www.residue.cc" target="_blank" rel="noreferrer noopener">WWW.RESIDUE.CC</a>
      <a class="lt-manage" href="link-admin.html">Manage / add links</a>
    </div>
  </div>

  <div class="lt-status lt-center" id="lt-status"></div>

  <div class="lt-contact-modal" id="lt-contact-consent" hidden>
    <div class="lt-contact-modal__backdrop" id="lt-contact-backdrop"></div>
    <div class="lt-contact-modal__panel" role="dialog" aria-modal="true" aria-labelledby="lt-contact-title">
      <h2 id="lt-contact-title">Save Contact Details</h2>
      <p id="lt-contact-message">You are requesting to save contact details to your device. Do you agree to continue?</p>
      <div class="lt-contact-modal__actions">
        <button class="lt-contact-btn lt-contact-btn--primary" id="lt-contact-agree" type="button">Agree</button>
        <button class="lt-contact-btn lt-contact-btn--secondary" id="lt-contact-disagree" type="button">Disagree</button>
      </div>
    </div>
  </div>

</body>
</html>
