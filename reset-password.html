<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reset Password | Residue</title>
  <link rel="icon" type="image/png" href="/images/residue-web-icon-rounded.png">
  <link rel="shortcut icon" type="image/png" href="/images/residue-web-icon-rounded.png">
  <link rel="stylesheet" href="css/linktree.css">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/env.js"></script>
</head>
<body class="lt-page" data-theme="dark">
  <div class="page-wrapper">
    <div class="lt-header">
      <div class="lt-brand"><span class="lt-bar"></span> Residue Links</div>
      <div class="lt-note">Choose a new password for your card admin account</div>
    </div>

    <div class="admin-card lt-auth-card">
      <div class="form-group">
        <div class="lt-label">Reset your password</div>
        <p class="lt-note" id="rp-subtitle" style="margin: 0;">
          Opened your recovery email? Enter your new password below.
        </p>
      </div>

      <div class="form-group">
        <div class="lt-label">New password</div>
        <input class="lt-input" type="password" id="rp-password" placeholder="Minimum 6 characters" autocomplete="new-password">
      </div>

      <div class="form-group">
        <div class="lt-label">Confirm new password</div>
        <input class="lt-input" type="password" id="rp-confirm-password" placeholder="Retype your new password" autocomplete="new-password">
      </div>

      <div class="form-group" style="gap: 12px;">
        <button class="lt-btn" id="rp-submit" type="button">Save new password</button>
        <a class="lt-btn secondary" id="rp-back" href="/link-admin">Back to sign in</a>
      </div>

      <div class="lt-status" id="rp-status"></div>
    </div>
  </div>

  <script type="module" src="js/reset-password.js"></script>
  <script src="js/password-toggle.js"></script>
</body>
</html>
